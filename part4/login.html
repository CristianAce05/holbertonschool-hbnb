<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBNB | Login</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="brand-bar">
            <a href="index.html" class="brand-link" aria-label="HBNB home page">
                <img src="logo.png" alt="HBNB logo" class="logo">
                <span class="brand-name">HBNB</span>
            </a>
            <a href="login.html" class="login-button" aria-current="page">Log In</a>
        </div>
        <nav class="main-nav" aria-label="Primary navigation">
            <a href="index.html">Places</a>
            <a href="place.html">Place Details</a>
            <a href="add_review.html">Add Review</a>
            <a href="login.html" aria-current="page">Login</a>
        </nav>
    </header>

    <main class="auth-layout">
        <section class="form-shell" aria-labelledby="login-heading">
            <p class="eyebrow">Member access</p>
            <h1 id="login-heading">Log in to manage reviews and saved places.</h1>
            <form class="form" action="#" method="post">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>

                <button type="submit" class="details-button submit-button">Sign In</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>All rights reserved.</p>
    </footer>
</body>
</html>
