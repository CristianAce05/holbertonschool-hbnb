<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>HBNB | Add Review</title>
    <meta name="api-base-url" content="http://127.0.0.1:5000/api/v1">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="brand-bar">
            <a href="/index.html?v=20260331c" class="brand-link" aria-label="HBNB home page">
                <img src="logo.png" alt="HBNB logo" class="logo">
                <span class="brand-name">HBNB</span>
            </a>
            <div class="header-actions">
                <a href="/login.html?v=20260331c" class="login-button" id="login-button">Log In</a>
                <button type="button" class="login-button logout-button" id="logout-button" hidden>Log Out</button>
            </div>
        </div>
        <nav class="main-nav" aria-label="Primary navigation">
            <a href="/index.html?v=20260331c">Places</a>
            <a href="/place.html?v=20260331c">Place Details</a>
            <a href="/add_review.html?v=20260331c" aria-current="page">Add Review</a>
            <a href="/login.html?v=20260331c" id="login-link">Login</a>
        </nav>
    </header>

    <main class="review-layout">
        <section class="add-review" aria-labelledby="review-form-heading">
            <p class="eyebrow">Authenticated area</p>
            <h1 id="review-form-heading">Add your review.</h1>
            <p class="supporting-copy" id="review-supporting-copy">Write a review for the selected place.</p>
            <p id="review-feedback" class="form-feedback" role="alert" aria-live="polite" hidden></p>

            <form class="form" id="review-form" action="#" method="post" novalidate>
                <label for="place">Place</label>
                <select id="place" name="place" required disabled>
                    <option value="">Loading place...</option>
                </select>

                <label for="review">Review</label>
                <textarea id="review" name="review" rows="6" placeholder="Describe the stay, the host, and the details that mattered most." required></textarea>

                <button type="submit" class="details-button submit-button" id="review-submit">Submit Review</button>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>All rights reserved.</p>
    </footer>
    <script src="scripts.js?v=20260331c"></script>
</body>
</html>
